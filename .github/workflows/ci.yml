name: Java CI (Branch Verification)

on:
  push:
    # Triggert bei jedem Push auf Feature-Branches laut eurer Namenskonvention
    branches:
      - 'feature/issue-[0-9]-*'
  pull_request:
    # Triggert, sobald ein PR gegen den main-Branch geöffnet oder aktualisiert wird
    branches:
      - main

jobs:
  run-tests:
    name: Build and Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven' # Aktiviert das smarte Maven-Caching

      - name: Execute Maven Tests
        run: mvn clean test