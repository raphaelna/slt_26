name: Java CD (Production Build)

on:
  push:
    # Triggert nur bei einem echten Commit auf dem main-Branch (z.B. durch einen Merge)
    branches:
      - main

jobs:
  build-and-deploy:
    name: Package and Upload JAR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Executable JAR
        run: mvn clean package -DskipTests

      - name: Upload JAR as GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tictactoe-game-jar
          path: target/*.jar
          if-no-files-found: error # Wirft einen Fehler, falls kein JAR generiert wurde